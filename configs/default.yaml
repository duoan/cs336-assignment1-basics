model:
  vocab_size: 10000
  context_length: 256
  d_model: 512
  num_layers: 4
  num_heads: 16
  d_ff: 1344
  rope_theta: 10000

training:
  batch_size: 16
  max_steps: 80000
  lr: 6e-4
  betas: [0.9, 0.95]
  eps: 1e-8
  weight_decay: 0.1
  max_lr: 6e-4
  min_lr: 6e-5
  warmup_iters: 2000
  cosine_cycle_iters: 80000
  max_l2_norm: 1.0
  eval_steps: 50
  log_interval: 100
  eval_interval: 1000
  save_interval: 10000

data:
  train_path: ./out/TinyStoriesV2-GPT4-train.ids.bin
  valid_path: ./out/TinyStoriesV2-GPT4-valid.ids.bin

resume: null
